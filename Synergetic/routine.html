<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutin Tervező</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/routine.css">
</head>
<body>

    <!-- NAVBAR -->
    <header class="routine-navbar">
        <div class="routine-nav-left">
            <button class="routine-back-btn" onclick="window.location.href='index.html'">← Vissza</button>
            <span class="routine-title">
                <span class="routine-title-accent">Heti Rutin</span> 
            </span>
        </div>
        <div class="routine-nav-right">
            <span class="routine-date-display" id="current-week-display"></span>
            <button class="routine-add-btn" id="open-routine-modal">+ Új rutin</button>
        </div>
    </header>

    <!-- EGYSÉGES HETI IDŐVONAL -->
    <div class="routine-global-timeline" id="global-timeline"></div>

    <!-- FŐ TARTALOM -->
    <div class="routine-main">
        <!-- Heti nézet (alapértelmezett) -->
        <div class="routine-week-view" id="routine-week-view"></div>

        <!-- Napi nézet (rejtett alapból) -->
        <div class="routine-day-detail-view" id="routine-day-view" style="display:none;"></div>

        <!-- Összegző sáv -->
        <div class="routine-summary-bar" id="routine-summary">
            <span><span class="routine-summary-dot" style="background:#4caf50;"></span> Feladat</span>
            <span><span class="routine-summary-dot" style="background:#ff9800;"></span> Esemény</span>
            <span><span class="routine-summary-dot" style="background:#1a1a1a; border: 1px solid #333;"></span> Szabad idő</span>
            <span id="summary-total-text">Összesen: 0 elem</span>
        </div>
    </div>

    <!-- MODAL -->
    <div class="routine-modal-overlay" id="routine-modal">
        <div class="routine-modal">
            <div class="routine-modal-header">
                <h2 id="routine-modal-title">Új Rutin Elem</h2>
                <button class="routine-modal-close" id="close-routine-modal">&times;</button>
            </div>
            <form class="routine-form" id="routine-form">
                <input type="hidden" id="routine-edit-id" value="">
                <div class="form-group">
                    <label>Megnevezés</label>
                    <input type="text" id="routine-title-input" class="form-control" placeholder="Pl. Reggeli edzés, Olvasás..." required>
                </div>
                <div class="form-group">
                    <label>Típus</label>
                    <select id="routine-type" class="form-control">
                        <option value="todo">Feladat (TODO)</option>
                        <option value="event">Esemény</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nap(ok)</label>
                    <div class="day-pills" id="day-pills">
                        <button type="button" class="day-pill" data-day="1">H</button>
                        <button type="button" class="day-pill" data-day="2">K</button>
                        <button type="button" class="day-pill" data-day="3">Sz</button>
                        <button type="button" class="day-pill" data-day="4">Cs</button>
                        <button type="button" class="day-pill" data-day="5">P</button>
                        <button type="button" class="day-pill" data-day="6">Szo</button>
                        <button type="button" class="day-pill" data-day="7">V</button>
                    </div>
                </div>
                <div class="time-row">
                    <div class="form-group">
                        <label>Kezdés</label>
                        <input type="time-local" id="routine-start" class="form-control" value="08:00" required>
                    </div>
                    <div class="form-group">
                        <label>Befejezés</label>
                        <input type="time-local" id="routine-end" class="form-control" value="09:00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Kategória (opcionális)</label>
                    <select id="routine-category" class="form-control">
                        <option value="">Nincs</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Szín</label>
                    <div class="color-preview">
                        <input type="color" id="routine-color" value="#e040fb">
                        <span style="font-size: 0.78rem; color: var(--text-secondary);">Egyedi szín a rutin elemhez</span>
                    </div>
                </div>
                <button type="submit" class="routine-submit-btn" id="routine-submit-btn">Létrehozás</button>
            </form>
        </div>
    </div>

    <script>
    const Routine = {
        items: [],
        completions: [],
        categories: [],
        todayDate: new Date(),
        currentView: 'week',   // 'week' | 'day'
        selectedDow: null,     // Napi nézetben kiválasztott nap (1-7)

        DAYS_SHORT: ['H', 'K', 'Sze', 'Cs', 'P', 'Szo', 'V'],
        DAYS_FULL: ['Hétfő', 'Kedd', 'Szerda', 'Csütörtök', 'Péntek', 'Szombat', 'Vasárnap'],
        MONTHS: ['Január','Február','Március','Április','Május','Június','Július','Augusztus','Szeptember','Október','November','December'],
        TL_START: 6,
        TL_END: 23,
        HOUR_H: 60, // px per óra a napi nézetben

        typeColors: { todo: '#4caf50', event: '#ff9800' },
        typeNames: { todo: 'Feladat', event: 'Esemény' },

        // === Segédfüggvények ===
        getTodayDow() {
            const d = this.todayDate.getDay();
            return d === 0 ? 7 : d;
        },
        getDateStr(date) {
            if (!date) date = this.todayDate;
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        },
        getMondayDate() {
            const d = new Date(this.todayDate);
            const day = d.getDay();
            d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
            d.setHours(0,0,0,0);
            return d;
        },
        getDateForDow(dow) {
            const mon = this.getMondayDate();
            const d = new Date(mon);
            d.setDate(mon.getDate() + (dow - 1));
            return d;
        },
        getItemsForDay(dow) {
            return this.items.filter(i => i.day_of_week == dow);
        },
        getItemColor(item) {
            return item.color_hex || item.category_color || this.typeColors[item.type] || '#888';
        },
        timeToMin(t) {
            if (!t) return 0;
            const p = t.split(':');
            return parseInt(p[0]) * 60 + parseInt(p[1]);
        },
        fmtTime(t) {
            if (!t) return '';
            return t.substring(0, 5);
        },
        isCompleted(id) {
            return this.completions.includes(id);
        },

        // === INIT ===
        async init() {
            const r = getComputedStyle(document.documentElement);
            this.typeColors.todo = r.getPropertyValue('--node-task').trim() || this.typeColors.todo;
            this.typeColors.event = r.getPropertyValue('--node-event').trim() || this.typeColors.event;

            this.initModal();
            this.updateWeekDisplay();
            await this.loadCategories();
            await this.loadAll();
        },

        updateWeekDisplay() {
            const mon = this.getMondayDate();
            const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
            const ms = ['Jan','Feb','Már','Ápr','Máj','Jún','Júl','Aug','Szept','Okt','Nov','Dec'];
            document.getElementById('current-week-display').textContent =
                `${mon.getFullYear()}. ${ms[mon.getMonth()]} ${mon.getDate()}. – ${ms[sun.getMonth()]} ${sun.getDate()}.`;
        },

        // === API ===
        async loadAll() {
            try {
                const [iRes, cRes] = await Promise.all([
                    fetch('api.php?action=get_routine_all'),
                    fetch(`api.php?action=get_routine_completions&date=${this.getDateStr()}`)
                ]);
                this.items = await iRes.json();
                this.completions = await cRes.json();
            } catch (e) {
                console.error(e);
                this.items = [];
                this.completions = [];
            }
            this.render();
        },

        async loadCategories() {
            try {
                const res = await fetch('api.php?action=get_categories');
                this.categories = await res.json();
                const sel = document.getElementById('routine-category');
                sel.innerHTML = '<option value="">Nincs</option>';
                this.categories.forEach(c => {
                    const o = document.createElement('option');
                    o.value = c.id; o.textContent = c.name;
                    sel.appendChild(o);
                });
            } catch (e) { console.error(e); }
        },

        async createItem(data) {
            try {
                const r = await fetch('api.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'create_routine_item',...data}) });
                return await r.json();
            } catch(e) { return {error:'Hálózati hiba'}; }
        },

        async updateItem(data) {
            try {
                const r = await fetch('api.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({action:'update_routine_item',...data}) });
                return await r.json();
            } catch(e) { return {error:'Hálózati hiba'}; }
        },

        async deleteItem(id) {
            try {
                const r = await fetch(`api.php?action=delete_routine_item&id=${id}`, {method:'DELETE'});
                return await r.json();
            } catch(e) { return {error:'Hálózati hiba'}; }
        },

        async toggleCompletion(itemId) {
            try {
                const r = await fetch('api.php', { method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({action:'toggle_routine_completion', routine_item_id:itemId, date:this.getDateStr()}) });
                const data = await r.json();
                if (data.completed) this.completions.push(itemId);
                else this.completions = this.completions.filter(id => id !== itemId);
                this.render();
            } catch(e) { console.error(e); }
        },

        // ================================================================
        //  RENDERELÉS
        // ================================================================
        render() {
            this.renderGlobalTimeline();

            if (this.currentView === 'day' && this.selectedDow) {
                document.getElementById('routine-week-view').style.display = 'none';
                document.getElementById('routine-day-view').style.display = 'flex';
                this.renderDayView(this.selectedDow);
            } else {
                document.getElementById('routine-week-view').style.display = 'grid';
                document.getElementById('routine-day-view').style.display = 'none';
                this.renderWeekView();
            }

            // Összegző
            let total = 0;
            for (let d = 1; d <= 7; d++) total += this.getItemsForDay(d).length;
            document.getElementById('summary-total-text').textContent = `Összesen: ${total} elem / hét`;
        },

        // ================================================================
        //  EGYSÉGES HETI IDŐVONAL (navbar alatt)
        // ================================================================
        renderGlobalTimeline() {
            const container = document.getElementById('global-timeline');
            container.innerHTML = '';

            const startH = this.TL_START;
            const endH = this.TL_END;
            const totalMin = (endH - startH) * 60;
            const todayDow = this.getTodayDow();

            // Óra fejléc
            const headerRow = document.createElement('div');
            headerRow.className = 'routine-tl-header';
            for (let h = startH; h <= endH; h += 2) {
                const pos = ((h - startH) * 60) / totalMin * 100;
                // Korrekcíó: a label pozíciója a padding-left (60px) utáni területen belül
                const label = document.createElement('div');
                label.className = 'routine-tl-hour-label';
                // Számítsuk ki a tényleges pozíciót a bar-area szélességéhez képest
                label.style.left = `calc(60px + (100% - 74px) * ${pos / 100})`;
                label.textContent = `${String(h).padStart(2,'0')}`;
                headerRow.appendChild(label);
            }
            container.appendChild(headerRow);

            // Napsorok
            for (let dow = 1; dow <= 7; dow++) {
                const row = document.createElement('div');
                row.className = `routine-tl-row ${dow === todayDow ? 'today' : ''} ${this.currentView === 'day' && this.selectedDow === dow ? 'active' : ''}`;

                const dateForDay = this.getDateForDow(dow);

                // Nap neve
                const label = document.createElement('div');
                label.className = 'routine-tl-day-label';
                label.innerHTML = `${this.DAYS_SHORT[dow-1]} <span class="tl-day-num">${dateForDay.getDate()}</span>`;
                row.appendChild(label);

                // Bár terület
                const barArea = document.createElement('div');
                barArea.className = 'routine-tl-bar-area';

                // Szabad idő háttér
                const freeBg = document.createElement('div');
                freeBg.className = 'routine-tl-free-bg';
                barArea.appendChild(freeBg);

                // Óra vonalak
                for (let h = startH; h <= endH; h++) {
                    const pos = ((h - startH) * 60) / totalMin * 100;
                    const tick = document.createElement('div');
                    tick.className = 'routine-tl-hour-tick';
                    tick.style.left = pos + '%';
                    barArea.appendChild(tick);
                }

                // Foglalt blokkok
                const dayItems = this.getItemsForDay(dow);
                dayItems.forEach(item => {
                    const sMin = this.timeToMin(item.start_time) - startH * 60;
                    const eMin = this.timeToMin(item.end_time) - startH * 60;
                    if (eMin <= 0 || sMin >= totalMin) return;

                    const left = Math.max(0, sMin / totalMin * 100);
                    const width = Math.min(100 - left, (eMin - Math.max(0, sMin)) / totalMin * 100);

                    const block = document.createElement('div');
                    block.className = 'routine-tl-block';
                    block.style.left = left + '%';
                    block.style.width = width + '%';
                    block.style.background = this.getItemColor(item);
                    block.title = `${item.title} (${this.fmtTime(item.start_time)} – ${this.fmtTime(item.end_time)})`;
                    barArea.appendChild(block);
                });

                row.appendChild(barArea);

                // Kattintás → Napi nézet
                row.addEventListener('click', () => {
                    this.selectedDow = dow;
                    this.currentView = 'day';
                    this.render();
                });

                container.appendChild(row);
            }
        },

        // ================================================================
        //  HETI NÉZET
        // ================================================================
        renderWeekView() {
            const grid = document.getElementById('routine-week-view');
            grid.innerHTML = '';
            const todayDow = this.getTodayDow();

            for (let dow = 1; dow <= 7; dow++) {
                const dayItems = this.getItemsForDay(dow);
                const dateForDay = this.getDateForDow(dow);

                const col = document.createElement('div');
                col.className = `routine-day-col ${dow === todayDow ? 'today' : ''}`;

                // Fejléc
                const header = document.createElement('div');
                header.className = 'routine-day-header';
                header.innerHTML = `
                    <div class="routine-day-name">${this.DAYS_SHORT[dow-1]}</div>
                    <div class="routine-day-num">${dateForDay.getDate()}</div>
                    <div class="routine-day-count">${dayItems.length} elem</div>
                `;
                header.addEventListener('click', () => {
                    this.selectedDow = dow;
                    this.currentView = 'day';
                    this.render();
                });
                col.appendChild(header);

                // Lista
                const list = document.createElement('div');
                list.className = 'routine-items-list';

                if (dayItems.length === 0) {
                    list.innerHTML = `
                        <div class="routine-empty-day">
                            <div class="routine-empty-day-icon">☁️</div>
                            <div class="routine-empty-day-text">Szabad nap</div>
                        </div>`;
                } else {
                    dayItems.sort((a,b) => this.timeToMin(a.start_time) - this.timeToMin(b.start_time));
                    dayItems.forEach(item => list.appendChild(this.renderItemCard(item)));
                }

                col.appendChild(list);
                grid.appendChild(col);
            }
        },

        // ================================================================
        //  KÁRTYA (heti nézetben)
        // ================================================================
        renderItemCard(item) {
            const card = document.createElement('div');
            card.className = `routine-item-card ${this.isCompleted(item.id) ? 'completed' : ''}`;
            card.style.borderLeftColor = this.getItemColor(item);

            const checked = this.isCompleted(item.id);

            // A HTML: checkbox | body | type badge | delete gomb — mind a flex flow-ban, nem absolute
            card.innerHTML = `
                <div class="routine-checkbox ${checked ? 'checked' : ''}" data-id="${item.id}"></div>
                <div class="routine-item-body">
                    <div class="routine-item-title">${item.title}</div>
                    <div class="routine-item-time">${this.fmtTime(item.start_time)} – ${this.fmtTime(item.end_time)}</div>
                </div>
                <span class="routine-item-type-badge" style="background:${this.typeColors[item.type] || '#888'}">${this.typeNames[item.type] || item.type}</span>
                <button class="routine-item-delete" title="Törlés">✕</button>
            `;

            card.querySelector('.routine-checkbox').addEventListener('click', (e) => {
                e.stopPropagation();
                this.toggleCompletion(item.id);
            });

            card.querySelector('.routine-item-delete').addEventListener('click', (e) => {
                e.stopPropagation();
                if (confirm(`Biztosan törlöd: "${item.title}"?`)) {
                    this.deleteItem(item.id).then(r => {
                        if (r && !r.error) { this.items = this.items.filter(i => i.id !== item.id); this.render(); }
                        else alert('Hiba törlés közben!');
                    });
                }
            });

            card.addEventListener('click', () => this.openEditModal(item));
            return card;
        },

        // ================================================================
        //  NAPI NÉZET (Google Calendar stílusú)
        // ================================================================
        renderDayView(dow) {
            const container = document.getElementById('routine-day-view');
            container.innerHTML = '';

            const dayItems = this.getItemsForDay(dow);
            const dateForDay = this.getDateForDow(dow);
            const todayDow = this.getTodayDow();
            const isToday = dow === todayDow;

            // Fejléc
            const header = document.createElement('div');
            header.className = 'routine-dv-header';
            header.innerHTML = `
                <button class="routine-dv-back" id="dv-back-btn">← Hét</button>
                <div class="routine-dv-title-area">
                    <div class="routine-dv-dayname">${this.DAYS_FULL[dow-1]}</div>
                    <div class="routine-dv-date">
                        <span class="dv-date-accent">${dateForDay.getDate()}.</span>
                        ${this.MONTHS[dateForDay.getMonth()]}
                    </div>
                </div>
                <div class="routine-dv-stats">${dayItems.length} elem</div>
            `;
            container.appendChild(header);

            header.querySelector('#dv-back-btn').addEventListener('click', () => {
                this.currentView = 'week';
                this.selectedDow = null;
                this.render();
            });

            if (dayItems.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'routine-dv-empty';
                empty.innerHTML = `
                    <div class="routine-dv-empty-icon">🌤️</div>
                    <div class="routine-dv-empty-text">Szabad nap</div>
                    <div class="routine-dv-empty-sub">Nincs beütemezve semmi erre a napra.</div>
                `;
                container.appendChild(empty);
                return;
            }

            // Idővonal
            const timeline = document.createElement('div');
            timeline.className = 'routine-dv-timeline';

            const H = this.HOUR_H;
            const totalH = 24 * H;

            // Gutter (óra számok)
            const gutter = document.createElement('div');
            gutter.className = 'routine-dv-gutter';
            gutter.style.height = totalH + 'px';
            for (let h = 0; h < 24; h++) {
                const lbl = document.createElement('div');
                lbl.className = 'routine-dv-hour-label';
                lbl.style.top = (h * H) + 'px';
                lbl.textContent = `${String(h).padStart(2,'0')}:00`;
                gutter.appendChild(lbl);
            }
            timeline.appendChild(gutter);

            // Fő oszlop
            const col = document.createElement('div');
            col.className = 'routine-dv-col';
            col.style.height = totalH + 'px';

            // Óra vonalak
            for (let h = 0; h < 24; h++) {
                const line = document.createElement('div');
                line.className = 'routine-dv-hour-line';
                line.style.top = (h * H) + 'px';
                col.appendChild(line);

                const half = document.createElement('div');
                half.className = 'routine-dv-half-line';
                half.style.top = (h * H + H/2) + 'px';
                col.appendChild(half);
            }

            // "Most" jelző (csak ha a mai napot nézzük)
            if (isToday) {
                const now = new Date();
                const mins = now.getHours() * 60 + now.getMinutes();
                const nowLine = document.createElement('div');
                nowLine.className = 'routine-dv-now';
                nowLine.style.top = (mins / 60 * H) + 'px';
                col.appendChild(nowLine);
            }

            // Blokkok elhelyezése (átfedés kezeléssel)
            dayItems.sort((a,b) => this.timeToMin(a.start_time) - this.timeToMin(b.start_time));

            const blocks = dayItems.map(item => {
                const sm = this.timeToMin(item.start_time);
                let em = this.timeToMin(item.end_time);
                if (em <= sm) em = sm + 30;
                return { item, sm, em };
            });

            // Oszlop számítás (átfedés)
            const cols = [];
            blocks.forEach(b => {
                let placed = false;
                for (let c = 0; c < cols.length; c++) {
                    if (b.sm >= cols[c][cols[c].length-1].em) {
                        cols[c].push(b);
                        b.ci = c;
                        placed = true;
                        break;
                    }
                }
                if (!placed) { b.ci = cols.length; cols.push([b]); }
            });

            const tc = cols.length;
            blocks.forEach(b => {
                const top = b.sm / 60 * H;
                const height = Math.max((b.em - b.sm) / 60 * H, 28);
                const w = (1/tc) * 100;
                const l = (b.ci/tc) * 100;

                const el = document.createElement('div');
                el.className = `routine-dv-block ${this.isCompleted(b.item.id) ? 'completed' : ''}`;
                el.style.cssText = `top:${top}px; height:${height}px; left:calc(${l}% + 8px); width:calc(${w}% - 16px); background:${this.getItemColor(b.item)};`;

                const timeStr = `${this.fmtTime(b.item.start_time)} – ${this.fmtTime(b.item.end_time)}`;
                const checked = this.isCompleted(b.item.id);

                el.innerHTML = `
                    <div class="routine-dv-block-title">${b.item.title}</div>
                    ${height > 36 ? `<div class="routine-dv-block-time">${timeStr}</div>` : ''}
                    <div class="routine-dv-block-checkbox ${checked ? 'checked' : ''}" data-id="${b.item.id}"></div>
                `;

                el.querySelector('.routine-dv-block-checkbox').addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.toggleCompletion(b.item.id);
                });

                el.addEventListener('click', () => this.openEditModal(b.item));

                col.appendChild(el);
            });

            timeline.appendChild(col);
            container.appendChild(timeline);

            // Scroll a legelső elem elé
            requestAnimationFrame(() => {
                if (blocks.length > 0) {
                    const firstMin = blocks[0].sm;
                    const scrollTarget = Math.max(0, (firstMin - 60) / 60 * H);
                    timeline.scrollTop = scrollTarget;
                } else if (isToday) {
                    const now = new Date();
                    const target = Math.max(0, (now.getHours()*60 + now.getMinutes() - 90) / 60 * H);
                    timeline.scrollTop = target;
                }
            });
        },

        // ================================================================
        //  MODAL
        // ================================================================
        initModal() {
            const modal = document.getElementById('routine-modal');
            const openBtn = document.getElementById('open-routine-modal');
            const closeBtn = document.getElementById('close-routine-modal');
            const form = document.getElementById('routine-form');
            const dayPills = document.querySelectorAll('.day-pill');

            openBtn.addEventListener('click', () => {
                this.resetForm();
                document.getElementById('routine-modal-title').textContent = 'Új Rutin Elem';
                document.getElementById('routine-submit-btn').textContent = 'Létrehozás';
                document.getElementById('routine-edit-id').value = '';

                // Ha napi nézetben vagyunk, az adott napot előválasztjuk
                if (this.currentView === 'day' && this.selectedDow) {
                    dayPills.forEach(p => {
                        p.classList.remove('active');
                        if (parseInt(p.dataset.day) === this.selectedDow) p.classList.add('active');
                    });
                }

                modal.classList.add('active');
            });

            closeBtn.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

            dayPills.forEach(pill => {
                pill.addEventListener('click', () => pill.classList.toggle('active'));
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('routine-submit-btn');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Mentés...';

                const editId = document.getElementById('routine-edit-id').value;
                const title = document.getElementById('routine-title-input').value;
                const type = document.getElementById('routine-type').value;
                const startTime = document.getElementById('routine-start').value;
                const endTime = document.getElementById('routine-end').value;
                const categoryId = document.getElementById('routine-category').value || null;
                const colorHex = document.getElementById('routine-color').value;

                const selectedDays = [];
                dayPills.forEach(p => { if (p.classList.contains('active')) selectedDays.push(parseInt(p.dataset.day)); });

                if (selectedDays.length === 0) {
                    alert('Kérlek válassz legalább egy napot!');
                    submitBtn.disabled = false;
                    submitBtn.textContent = editId ? 'Mentés' : 'Létrehozás';
                    return;
                }

                if (editId) {
                    const res = await this.updateItem({ id:parseInt(editId), title, type, start_time:startTime, end_time:endTime, category_id:categoryId, color_hex:colorHex, day_of_week:selectedDays[0] });
                    if (res && !res.error) { await this.loadAll(); modal.classList.remove('active'); }
                    else alert('Hiba: ' + (res.error || 'Ismeretlen'));
                } else {
                    let ok = true;
                    for (const dow of selectedDays) {
                        const res = await this.createItem({ title, type, day_of_week:dow, start_time:startTime, end_time:endTime, category_id:categoryId, color_hex:colorHex });
                        if (res.error) { alert('Hiba: ' + res.error); ok = false; break; }
                    }
                    if (ok) { await this.loadAll(); modal.classList.remove('active'); }
                }

                submitBtn.disabled = false;
                submitBtn.textContent = editId ? 'Mentés' : 'Létrehozás';
            });
        },

        resetForm() {
            document.getElementById('routine-form').reset();
            document.getElementById('routine-start').value = '08:00';
            document.getElementById('routine-end').value = '09:00';
            document.getElementById('routine-color').value = '#e040fb';
            document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('active'));
        },

        openEditModal(item) {
            const modal = document.getElementById('routine-modal');
            document.getElementById('routine-modal-title').textContent = 'Rutin Szerkesztése';
            document.getElementById('routine-submit-btn').textContent = 'Mentés';
            document.getElementById('routine-edit-id').value = item.id;
            document.getElementById('routine-title-input').value = item.title;
            document.getElementById('routine-type').value = item.type;
            document.getElementById('routine-start').value = this.fmtTime(item.start_time);
            document.getElementById('routine-end').value = this.fmtTime(item.end_time);
            document.getElementById('routine-category').value = item.category_id || '';
            document.getElementById('routine-color').value = item.color_hex || '#e040fb';

            document.querySelectorAll('.day-pill').forEach(p => {
                p.classList.remove('active');
                if (parseInt(p.dataset.day) === parseInt(item.day_of_week)) p.classList.add('active');
            });

            modal.classList.add('active');
        }
    };

    document.addEventListener('DOMContentLoaded', () => Routine.init());
    </script>
</body>
</html>
