<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naptár Nézet</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/calendar.css">
    <style>
        .mv-agenda-section { margin-bottom: 4px; }
        .mv-agenda-section-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-secondary);
            padding: 8px 14px 4px;
            opacity: 0.7;
        }
        .mv-todo-item { align-items: center; }
        .mv-todo-meta { font-style: italic; opacity: 0.75; }
        .mv-todo-deadline-badge {
            flex-shrink: 0;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(251, 146, 60, 0.18);
            color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.4);
            white-space: nowrap;
        }
        .mv-todo-start-badge {
            flex-shrink: 0;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.35);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <header class="cal-navbar">
        <div class="cal-nav-left">
            <button class="cal-back-btn" onclick="window.location.href='index.html'">← Vissza</button>
            <button class="cal-today-btn" id="btn-today">Ma</button>
            <div class="cal-nav-arrows">
                <button class="cal-arrow" id="btn-prev">‹</button>
                <button class="cal-arrow" id="btn-next">›</button>
            </div>
            <span class="cal-title" id="cal-title"></span>
        </div>
        <div class="cal-view-tabs" id="view-tabs">
            <button class="cal-view-tab" data-view="day">Nap</button>
            <button class="cal-view-tab" data-view="week">Hét</button>
            <button class="cal-view-tab active" data-view="month">Hónap</button>
        </div>
    </header>

    <div class="cal-main" id="cal-main"></div>

    <script>
    const Cal = {
        date: new Date(),
        selected: new Date(),
        view: 'month',
        entries: [],
        H: 56,
        MONTHS: ["Január","Február","Március","Április","Május","Június",
                  "Július","Augusztus","Szeptember","Október","November","December"],
        DAYS_S: ["H","K","Sze","Cs","P","Szo","V"],
        DAYS_F: ["Hétfő","Kedd","Szerda","Csütörtök","Péntek","Szombat","Vasárnap"],
        colors: { task:'#4caf50', todo:'#4caf50', event:'#ff9800', note:'#7986cb' },
        names:  { task:'Feladat', todo:'Feladat', event:'Esemény', note:'Jegyzet' },
        el: null, titleEl: null,

        init() {
            const r = getComputedStyle(document.documentElement);
            this.colors.task = r.getPropertyValue('--node-task').trim() || this.colors.task;
            this.colors.todo = this.colors.task;
            this.colors.event = r.getPropertyValue('--node-event').trim() || this.colors.event;
            this.colors.note = r.getPropertyValue('--node-note').trim() || this.colors.note;
            this.el = document.getElementById('cal-main');
            this.titleEl = document.getElementById('cal-title');
            document.getElementById('btn-prev').addEventListener('click', () => this.step(-1));
            document.getElementById('btn-next').addEventListener('click', () => this.step(1));
            document.getElementById('btn-today').addEventListener('click', () => { this.date = new Date(); this.selected = new Date(); this.render(); });
            document.getElementById('view-tabs').addEventListener('click', e => {
                if (!e.target.dataset.view) return;
                document.querySelectorAll('.cal-view-tab').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                this.view = e.target.dataset.view;
                this.render();
            });
            this.load();
        },

        step(dir) {
            if (this.view === 'month') this.date.setMonth(this.date.getMonth() + dir);
            else if (this.view === 'week') this.date.setDate(this.date.getDate() + dir * 7);
            else this.date.setDate(this.date.getDate() + dir);
            this.render();
        },

        async load() {
            try { const r = await fetch('api.php?action=get_calendar'); this.entries = await r.json(); }
            catch(e) { console.error(e); this.entries = []; }
            this.render();
        },

        col(t) { return this.colors[t] || '#666'; },
        sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); },
        isToday(d) { return this.sameDay(d, new Date()); },
        monday(d) { const r = new Date(d); const day = r.getDay(); r.setDate(r.getDate() - day + (day === 0 ? -6 : 1)); r.setHours(0,0,0,0); return r; },
        dayIdx(d) { return (d.getDay() + 6) % 7; },
        fmtTime(s) { if (!s) return ''; const d = new Date(s.replace(' ','T')); return d.toLocaleTimeString('hu-HU',{hour:'2-digit',minute:'2-digit'}); },
        isAllDay(e) { return e.is_all_day == 1; },

        forDate(target) {
            const t = new Date(target); t.setHours(0,0,0,0);
            return this.entries.filter(e => {
                // TODO: csak planned_start napján és/vagy deadline napján jelenik meg, NEM intervallumként
                if (e.type === 'todo') {
                    if (e.start_datetime) {
                        const ps = new Date(e.start_datetime.replace(' ','T')); ps.setHours(0,0,0,0);
                        if (t.getTime() === ps.getTime()) return true;
                    }
                    if (e.end_datetime) {
                        const dl = new Date(e.end_datetime.replace(' ','T')); dl.setHours(0,0,0,0);
                        if (t.getTime() === dl.getTime()) return true;
                    }
                    return false;
                }
                // EVENT: tól-ig intervallum
                if (!e.start_datetime) return false;
                const s = new Date(e.start_datetime.replace(' ','T')); s.setHours(0,0,0,0);
                if (e.end_datetime) { const end = new Date(e.end_datetime.replace(' ','T')); end.setHours(0,0,0,0); return t >= s && t <= end; }
                return t.getTime() === s.getTime();
            });
        },
        // TODO-k nem kerülnek az idővonalas blokkba
        timedFor(d) { return this.forDate(d).filter(e => !this.isAllDay(e) && e.type !== 'todo'); },
        alldayFor(d) { return this.forDate(d).filter(e => this.isAllDay(e) && e.type !== 'todo'); },
        todoFor(d)   { return this.forDate(d).filter(e => e.type === 'todo'); },

        render() {
            this.updateTitle();
            this.el.innerHTML = '';
            if (this.view === 'month') this.renderMonth();
            else if (this.view === 'week') this.renderWeek();
            else this.renderDay();
        },

        setupDividerDrag(divider, gridWrap, agenda) {
            let isMouseDown = false;
            const mvContainer = divider.closest('.mv');

            divider.addEventListener('mousedown', (e) => {
                isMouseDown = true;
                divider.classList.add('dragging');
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isMouseDown || !mvContainer) return;

                const containerRect = mvContainer.getBoundingClientRect();
                const relativeY = e.clientY - containerRect.top;
                const containerHeight = containerRect.height;

                // Constrain to reasonable limits (15% to 85%)
                const minHeight = containerHeight * 0.15;
                const maxHeight = containerHeight * 0.85;
                const newGridHeight = Math.max(minHeight, Math.min(relativeY, maxHeight));

                // Set grid to fixed height, agenda gets the rest with flex
                gridWrap.style.flexBasis = newGridHeight + 'px';
                gridWrap.style.flexGrow = '0';
                gridWrap.style.flexShrink = '0';
                gridWrap.style.overflow = 'auto';
                
                // Make agenda responsive and fill remaining space
                agenda.style.flex = '1';
                agenda.style.minHeight = '0';
            });

            document.addEventListener('mouseup', () => {
                if (isMouseDown) {
                    isMouseDown = false;
                    divider.classList.remove('dragging');
                }
            });
        },

        updateTitle() {
            const y = this.date.getFullYear(), m = this.date.getMonth();
            if (this.view === 'month') {
                this.titleEl.textContent = `${y}. ${this.MONTHS[m]}`;
            } else if (this.view === 'week') {
                const mon = this.monday(this.date);
                const sun = new Date(mon); sun.setDate(mon.getDate()+6);
                const s = `${this.MONTHS[mon.getMonth()]} ${mon.getDate()}.`;
                const e = mon.getMonth()!==sun.getMonth() ? `${this.MONTHS[sun.getMonth()]} ${sun.getDate()}.` : `${sun.getDate()}.`;
                this.titleEl.textContent = `${y}. ${s} – ${e}`;
            } else {
                this.titleEl.textContent = `${y}. ${this.MONTHS[m]} ${this.date.getDate()}., ${this.DAYS_F[this.dayIdx(this.date)]}`;
            }
        },

        // =========== HAVI NÉZET ===========
        renderMonth() {
            const wrap = document.createElement('div'); wrap.className = 'mv';
            const gridWrap = document.createElement('div'); gridWrap.className = 'mv-grid-wrap';

            const daynames = document.createElement('div'); daynames.className = 'mv-daynames';
            this.DAYS_S.forEach(n => { const el = document.createElement('div'); el.className = 'mv-dayname'; el.textContent = n; daynames.appendChild(el); });
            gridWrap.appendChild(daynames);

            const grid = document.createElement('div'); grid.className = 'mv-grid';
            const year = this.date.getFullYear(), month = this.date.getMonth();
            const startOfs = (new Date(year, month, 1).getDay() + 6) % 7;
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const prevDays = new Date(year, month, 0).getDate();
            const totalCells = Math.ceil((startOfs + daysInMonth) / 7) * 7;

            for (let i = 0; i < totalCells; i++) {
                let cellDate, dayNum, isOther = false;
                if (i < startOfs) { dayNum = prevDays - startOfs + 1 + i; cellDate = new Date(year, month-1, dayNum); isOther = true; }
                else if (i >= startOfs + daysInMonth) { dayNum = i - startOfs - daysInMonth + 1; cellDate = new Date(year, month+1, dayNum); isOther = true; }
                else { dayNum = i - startOfs + 1; cellDate = new Date(year, month, dayNum); }

                const cell = document.createElement('div'); cell.className = 'mv-cell';
                if (isOther) cell.classList.add('other');
                if (this.isToday(cellDate)) cell.classList.add('today');
                if (this.sameDay(cellDate, this.selected)) cell.classList.add('selected');

                const num = document.createElement('div'); num.className = 'mv-cell-num'; num.textContent = dayNum;
                cell.appendChild(num);

                const entries = this.forDate(cellDate);
                if (entries.length > 0) {
                    const dots = document.createElement('div'); dots.className = 'mv-dots';
                    entries.slice(0, 4).forEach(e => { const dot = document.createElement('div'); dot.className = 'mv-dot'; dot.style.background = this.col(e.type); dots.appendChild(dot); });
                    cell.appendChild(dots);
                }

                const captured = new Date(cellDate);
                cell.addEventListener('click', () => {
                    this.selected = captured;
                    grid.querySelectorAll('.mv-cell').forEach(c => c.classList.remove('selected'));
                    cell.classList.add('selected');
                    this.renderAgenda(wrap, captured);
                });
                grid.appendChild(cell);
            }

            gridWrap.appendChild(grid); wrap.appendChild(gridWrap);
            const div = document.createElement('div'); div.className = 'mv-divider'; wrap.appendChild(div);
            const agenda = document.createElement('div'); agenda.className = 'mv-agenda'; agenda.id = 'mv-agenda'; wrap.appendChild(agenda);
            
            // Setup draggable divider
            this.setupDividerDrag(div, gridWrap, agenda);
            
            this.el.appendChild(wrap);
            this.renderAgenda(wrap, this.selected);
        },

        renderAgenda(wrap, date) {
            const agenda = wrap.querySelector('.mv-agenda');
            if (!agenda) return;
            agenda.innerHTML = '';

            const header = document.createElement('div'); header.className = 'mv-agenda-header';
            const bigNum = document.createElement('div'); bigNum.className = 'mv-agenda-day'; bigNum.textContent = date.getDate();
            const meta = document.createElement('div'); meta.className = 'mv-agenda-meta'; meta.textContent = `${this.MONTHS[date.getMonth()]}, ${this.DAYS_F[this.dayIdx(date)]}`;
            header.appendChild(bigNum); header.appendChild(meta); agenda.appendChild(header);

            const todos   = this.todoFor(date);
            const events  = this.forDate(date).filter(e => e.type !== 'todo');
            if (todos.length === 0 && events.length === 0) {
                const empty = document.createElement('div'); empty.className = 'mv-agenda-empty'; empty.textContent = 'Nincs bejegyzés erre a napra';
                agenda.appendChild(empty); return;
            }

            // ── TODO szekció ──────────────────────────────────────────────
            if (todos.length > 0) {
                const todoSection = document.createElement('div'); todoSection.className = 'mv-agenda-section';
                const secLabel = document.createElement('div'); secLabel.className = 'mv-agenda-section-label'; secLabel.textContent = 'Teendők';
                todoSection.appendChild(secLabel);
                const todoList = document.createElement('div'); todoList.className = 'mv-agenda-list';
                todos.forEach(entry => {
                    const t = new Date(date); t.setHours(0,0,0,0);
                    // Meghatározzuk, hogy ez a nap planned_start vagy deadline
                    let role = '';
                    if (entry.start_datetime) {
                        const ps = new Date(entry.start_datetime.replace(' ','T')); ps.setHours(0,0,0,0);
                        if (t.getTime() === ps.getTime()) role = 'start';
                    }
                    if (entry.end_datetime) {
                        const dl = new Date(entry.end_datetime.replace(' ','T')); dl.setHours(0,0,0,0);
                        if (t.getTime() === dl.getTime()) role = role === 'start' ? 'both' : 'deadline';
                    }
                    const color = this.col(entry.type);
                    const item = document.createElement('div'); item.className = 'mv-agenda-item mv-todo-item';
                    item.style.borderLeftColor = color;
                    let badge = '';
                    if (role === 'deadline' || role === 'both') {
                        badge = `<div class="mv-todo-deadline-badge">⏰ Határidő</div>`;
                    } else if (role === 'start') {
                        badge = `<div class="mv-todo-start-badge">▶ Kezdés</div>`;
                    }
                    let metaStr = '';
                    if (entry.end_datetime) {
                        const dl = new Date(entry.end_datetime.replace(' ','T'));
                        metaStr = `Határidő: ${dl.toLocaleDateString('hu-HU', {month:'short', day:'numeric'})}`;
                        if (entry.start_datetime) {
                            const ps = new Date(entry.start_datetime.replace(' ','T'));
                            metaStr += ` · Tervezett: ${ps.toLocaleDateString('hu-HU', {month:'short', day:'numeric'})}`;
                        }
                    } else if (entry.start_datetime) {
                        metaStr = 'Tervezett kezdés napja';
                    }
                    item.innerHTML = `<div class="mv-agenda-item-body"><div class="mv-agenda-item-title">${entry.title}</div><div class="mv-agenda-item-time mv-todo-meta">${metaStr}</div></div>${badge}`;
                    item.addEventListener('click', () => window.location.href = `details.html?id=${entry.id}`);
                    todoList.appendChild(item);
                });
                todoSection.appendChild(todoList);
                agenda.appendChild(todoSection);
            }

            // ── EVENT / NOTE szekció ──────────────────────────────────────
            if (events.length > 0) {
                const evSection = document.createElement('div'); evSection.className = 'mv-agenda-section';
                if (todos.length > 0) { const secLabel = document.createElement('div'); secLabel.className = 'mv-agenda-section-label'; secLabel.textContent = 'Események'; evSection.appendChild(secLabel); }
                const list = document.createElement('div'); list.className = 'mv-agenda-list';
                events.sort((a,b) => new Date(a.start_datetime.replace(' ','T')) - new Date(b.start_datetime.replace(' ','T')));
                events.forEach(entry => {
                    const item = document.createElement('div'); item.className = 'mv-agenda-item';
                    item.style.borderLeftColor = this.col(entry.type);
                    let timeStr = 'Egész nap';
                    if (!this.isAllDay(entry)) { timeStr = this.fmtTime(entry.start_datetime); if (entry.end_datetime) timeStr += ' – ' + this.fmtTime(entry.end_datetime); }
                    item.innerHTML = `<div class="mv-agenda-item-body"><div class="mv-agenda-item-title">${entry.title}</div><div class="mv-agenda-item-time">${timeStr}</div></div><div class="mv-agenda-item-badge" style="background:${this.col(entry.type)}">${this.names[entry.type]||entry.type}</div>`;
                    item.addEventListener('click', () => window.location.href = `details.html?id=${entry.id}`);
                    list.appendChild(item);
                });
                evSection.appendChild(list);
                agenda.appendChild(evSection);
            }
        },

        // =========== HETI NÉZET ===========
        renderWeek() {
            const wrap = document.createElement('div'); wrap.className = 'wv';
            const mon = this.monday(this.date);
            const days = []; for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate()+i); days.push(d); }

            // Fejléc
            const header = document.createElement('div'); header.className = 'wv-header';
            header.innerHTML = '<div class="wv-header-corner"></div>';
            days.forEach((d,i) => {
                const el = document.createElement('div'); el.className = 'wv-header-day';
                if (this.isToday(d)) el.classList.add('today');
                el.innerHTML = `<div class="wv-header-dayname">${this.DAYS_S[i]}</div><div class="wv-header-daynum">${d.getDate()}</div>`;
                el.addEventListener('click', () => { this.date = new Date(d); this.view = 'day'; document.querySelectorAll('.cal-view-tab').forEach(b => b.classList.remove('active')); document.querySelector('.cal-view-tab[data-view="day"]').classList.add('active'); this.render(); });
                header.appendChild(el);
            });
            wrap.appendChild(header);

            // Egész napos
            let hasAllday = false;
            const alldayRow = document.createElement('div'); alldayRow.className = 'wv-allday';
            alldayRow.innerHTML = '<div class="wv-allday-label">Egész<br>nap</div>';
            days.forEach(d => {
                const cell = document.createElement('div'); cell.className = 'wv-allday-cell';
                const ae = this.alldayFor(d);
                if (ae.length > 0) hasAllday = true;
                ae.forEach(e => { const chip = document.createElement('div'); chip.className = 'wv-allday-chip'; chip.style.background = this.col(e.type); chip.textContent = e.title; chip.addEventListener('click', () => window.location.href = `details.html?id=${e.id}`); cell.appendChild(chip); });
                alldayRow.appendChild(cell);
            });
            if (hasAllday) { alldayRow.classList.add('has-items'); wrap.appendChild(alldayRow); }

            // Idővonal
            const body = document.createElement('div'); body.className = 'wv-body';
            const totalH = 24 * this.H;

            const gutter = document.createElement('div'); gutter.className = 'wv-gutter'; gutter.style.height = totalH + 'px';
            for (let h = 0; h < 24; h++) { const lbl = document.createElement('div'); lbl.className = 'wv-hour-label'; lbl.style.top = (h*this.H)+'px'; lbl.textContent = `${String(h).padStart(2,'0')}:00`; gutter.appendChild(lbl); }
            body.appendChild(gutter);

            days.forEach(d => {
                const col = document.createElement('div'); col.className = 'wv-col'; col.style.height = totalH + 'px';
                for (let h = 0; h < 24; h++) {
                    const line = document.createElement('div'); line.className = 'wv-hour-line'; line.style.top = (h*this.H)+'px'; col.appendChild(line);
                    const half = document.createElement('div'); half.className = 'wv-half-line'; half.style.top = (h*this.H+this.H/2)+'px'; col.appendChild(half);
                }
                if (this.isToday(d)) { const now = new Date(); const mins = now.getHours()*60+now.getMinutes(); const line = document.createElement('div'); line.className = 'wv-now'; line.style.top = (mins/60*this.H)+'px'; col.appendChild(line); }
                this.placeBlocks(col, this.timedFor(d), d);
                body.appendChild(col);
            });

            wrap.appendChild(body); this.el.appendChild(wrap); this.scrollNow(body);
        },

        // =========== NAPI NÉZET ===========
        renderDay() {
            const wrap = document.createElement('div'); wrap.className = 'dv';
            const d = this.date;

            const header = document.createElement('div'); header.className = 'dv-header';
            if (this.isToday(d)) header.classList.add('today');
            header.innerHTML = `<div class="dv-header-dayname">${this.DAYS_F[this.dayIdx(d)]}</div><div class="dv-header-num">${d.getDate()}</div>`;
            wrap.appendChild(header);

            const ae = this.alldayFor(d);
            if (ae.length > 0) {
                const alldayRow = document.createElement('div'); alldayRow.className = 'wv-allday has-items day-mode';
                alldayRow.innerHTML = '<div class="wv-allday-label">Egész<br>nap</div>';
                const cell = document.createElement('div'); cell.className = 'wv-allday-cell';
                ae.forEach(e => { const chip = document.createElement('div'); chip.className = 'wv-allday-chip'; chip.style.background = this.col(e.type); chip.textContent = e.title; chip.addEventListener('click', () => window.location.href = `details.html?id=${e.id}`); cell.appendChild(chip); });
                alldayRow.appendChild(cell); wrap.appendChild(alldayRow);
            }

            const body = document.createElement('div'); body.className = 'dv-body';
            const totalH = 24 * this.H;

            const gutter = document.createElement('div'); gutter.className = 'wv-gutter'; gutter.style.height = totalH + 'px';
            for (let h = 0; h < 24; h++) { const lbl = document.createElement('div'); lbl.className = 'wv-hour-label'; lbl.style.top = (h*this.H)+'px'; lbl.textContent = `${String(h).padStart(2,'0')}:00`; gutter.appendChild(lbl); }
            body.appendChild(gutter);

            const col = document.createElement('div'); col.className = 'dv-col'; col.style.height = totalH + 'px';
            for (let h = 0; h < 24; h++) {
                const line = document.createElement('div'); line.className = 'wv-hour-line'; line.style.top = (h*this.H)+'px'; col.appendChild(line);
                const half = document.createElement('div'); half.className = 'wv-half-line'; half.style.top = (h*this.H+this.H/2)+'px'; col.appendChild(half);
            }
            if (this.isToday(d)) { const now = new Date(); const mins = now.getHours()*60+now.getMinutes(); const line = document.createElement('div'); line.className = 'wv-now'; line.style.top = (mins/60*this.H)+'px'; col.appendChild(line); }
            this.placeBlocks(col, this.timedFor(d), d);
            body.appendChild(col); wrap.appendChild(body); this.el.appendChild(wrap); this.scrollNow(body);
        },

        // =========== BLOKK ELHELYEZÉS ===========
        placeBlocks(column, entries, dayDate) {
            if (!entries.length) return;
            const dayStart = new Date(dayDate); dayStart.setHours(0,0,0,0);
            const dayEnd = new Date(dayDate); dayEnd.setHours(23,59,59,999);

            const blocks = entries.map(e => {
                const s = new Date(e.start_datetime.replace(' ','T'));
                let sm = s < dayStart ? 0 : s.getHours()*60+s.getMinutes();
                let em;
                if (e.end_datetime) { const end = new Date(e.end_datetime.replace(' ','T')); em = end > dayEnd ? 24*60 : end.getHours()*60+end.getMinutes(); }
                else { em = sm + 60; }
                if (em <= sm) em = sm + 30;
                return { e, sm, em };
            });
            blocks.sort((a,b) => a.sm - b.sm || (b.em-b.sm)-(a.em-a.sm));

            const cols = [];
            blocks.forEach(b => {
                let placed = false;
                for (let c = 0; c < cols.length; c++) { if (b.sm >= cols[c][cols[c].length-1].em) { cols[c].push(b); b.ci = c; placed = true; break; } }
                if (!placed) { b.ci = cols.length; cols.push([b]); }
            });

            const tc = cols.length;
            blocks.forEach(b => {
                const top = b.sm/60*this.H, height = Math.max((b.em-b.sm)/60*this.H, 18);
                const w = (1/tc)*100, l = (b.ci/tc)*100;
                const el = document.createElement('div'); el.className = 'ev-block';
                el.style.cssText = `top:${top}px;height:${height}px;left:calc(${l}% + 2px);width:calc(${w}% - 4px);background:${this.col(b.e.type)};`;
                const time = this.fmtTime(b.e.start_datetime) + (b.e.end_datetime ? ' – '+this.fmtTime(b.e.end_datetime) : '');
                el.innerHTML = `<div class="ev-block-title">${b.e.title}</div>${height > 28 ? `<div class="ev-block-time">${time}</div>` : ''}`;
                el.addEventListener('click', () => window.location.href = `details.html?id=${b.e.id}`);
                column.appendChild(el);
            });
        },

        scrollNow(container) {
            requestAnimationFrame(() => {
                const now = new Date();
                const target = Math.max(0, (now.getHours()*60+now.getMinutes()-90))/60*this.H;
                container.scrollTop = target;
            });
        }
    };

    document.addEventListener('DOMContentLoaded', () => Cal.init());
    </script>
</body>
</html>
