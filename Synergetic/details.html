<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Részletes Nézet</title>
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/details.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <button class="filter-btn" onclick="window.location.href='index.html'">← Vissza a gráfhoz</button>

        <div class="toolbar">
            <button type="button" onclick="fmt('bold')"><b>B</b></button>
            <button type="button" onclick="fmt('italic')"><i>I</i></button>
            <button type="button" onclick="fmt('underline')"><u>U</u></button>
            <button type="button" onclick="fmt('insertUnorderedList')">• Lista</button>
            <button type="button" onclick="fsize(1)">A+</button>
            <button type="button" onclick="fsize(-1)">A-</button>
            <select id="font-family">
                <option value="'Segoe UI', sans-serif">Alapértelmezett</option>
                <option value="Arial, sans-serif">Arial</option>
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="'Courier New', monospace">Courier New</option>
            </select>
        </div>

        <button class="filter-btn active" id="save-btn">Mentés</button>
    </div>

    <!-- Editor -->
    <div class="editor-container">

        <!-- Badge row: type | category | tags | +tag -->
        <div class="badge-row" id="badge-row">
            <span id="type-badge" class="type-badge">…</span>
            <span id="cat-slot"></span>
            <span id="tags-slot"></span>
            <button class="add-tag-btn" id="add-tag-btn" style="display:none;">+ Tag</button>
        </div>

        <!-- Attachments -->
        <div class="attachments-section">
            <div class="attachments-label">Csatolmányok</div>
            <div class="attachments-grid" id="att-grid"></div>
        </div>

        <!-- Title -->
        <input type="text" id="detail-title" class="editor-title" placeholder="Bejegyzés címe...">

        <!-- Content -->
        <div id="detail-content" class="editor-content" contenteditable="true"></div>
    </div>

    <!-- Category picker -->
    <div class="picker-popup" id="cat-picker">
        <div class="picker-header">
            <input class="picker-search" id="cat-search" placeholder="Keresés...">
            <button class="picker-create-btn" id="cat-create-btn">+ Új kategória</button>
        </div>
        <ul class="picker-list" id="cat-list"></ul>
    </div>

    <!-- Tag picker -->
    <div class="picker-popup" id="tag-picker">
        <div class="picker-header">
            <input class="picker-search" id="tag-search" placeholder="Keresés...">
            <button class="picker-create-btn" id="tag-create-btn">+ Új tag</button>
        </div>
        <ul class="picker-list" id="tag-list"></ul>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lb-close">&times;</button>
        <img id="lb-img" src="" alt="">
    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" style="display:none;"
           accept="image/*,video/*,text/plain,text/csv,text/markdown,application/pdf,audio/*">

    <script>
    /* ═══════════════════════════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════════════════════════ */
    const params   = new URLSearchParams(window.location.search);
    const entryId  = params.get('id');
    if (!entryId) { alert('Nincs kiválasztva elem!'); location.href = 'index.html'; }

    const typeColors = {
        task:  getComputedStyle(document.documentElement).getPropertyValue('--node-task').trim()  || '#4caf50',
        event: getComputedStyle(document.documentElement).getPropertyValue('--node-event').trim() || '#ff9800',
        note:  getComputedStyle(document.documentElement).getPropertyValue('--node-note').trim()  || '#7986cb',
        todo:  getComputedStyle(document.documentElement).getPropertyValue('--node-task').trim()  || '#4caf50',
    };
    const IMAGE_TYPES = ['image/jpeg','image/jpg','image/png','image/gif','image/webp','image/svg+xml'];
    const FILE_ICON   = mime => {
        if (!mime) return '📎';
        if (mime.startsWith('image'))       return '🖼️';
        if (mime.startsWith('video'))       return '🎬';
        if (mime.startsWith('audio'))       return '🎵';
        if (mime === 'application/pdf')     return '📄';
        if (mime === 'text/csv')            return '📊';
        return '📝';
    };

    // Mutable state
    let currentCatId    = null;
    let currentCatName  = null;
    let currentCatColor = null;
    let currentTags     = [];   // [{id, name, color_hex}]
    let attachments     = [];   // [{id, file_path, file_type, original_name}]
    let allCategories   = [];
    let allTags         = [];

    /* ═══════════════════════════════════════════════════════════════════
       DOM REFS
    ═══════════════════════════════════════════════════════════════════ */
    const typeBadge    = document.getElementById('type-badge');
    const catSlot      = document.getElementById('cat-slot');
    const tagsSlot     = document.getElementById('tags-slot');
    const addTagBtn    = document.getElementById('add-tag-btn');
    const attGrid      = document.getElementById('att-grid');
    const titleEl      = document.getElementById('detail-title');
    const contentEl    = document.getElementById('detail-content');
    const saveBtn      = document.getElementById('save-btn');
    const fileInput    = document.getElementById('file-input');
    const lightbox     = document.getElementById('lightbox');
    const lbImg        = document.getElementById('lb-img');

    /* ═══════════════════════════════════════════════════════════════════
       INITIAL LOAD
    ═══════════════════════════════════════════════════════════════════ */
    async function init() {
        // Load categories & tags for pickers (parallel)
        const [cats, tags] = await Promise.all([
            fetch('api.php?action=get_categories').then(r => r.json()),
            fetch('api.php?action=get_tags').then(r => r.json())
        ]);
        allCategories = cats || [];
        allTags       = tags || [];

        // Load entry data
        const data = await fetch(`api.php?entry_id=${entryId}`).then(r => {
            if (!r.ok) throw new Error('A bejegyzés nem található.');
            return r.json();
        }).catch(err => { alert(err.message); location.href = 'index.html'; });

        if (!data) return;

        // Fill basic fields
        titleEl.value        = data.title;
        contentEl.innerHTML  = data.content || '';
        typeBadge.textContent = data.type;
        typeBadge.style.backgroundColor = typeColors[data.type] || '#555';

        // Category — use the data directly from server
        currentCatId    = data.category_id    || null;
        currentCatName  = data.category_name  || null;
        currentCatColor = data.category_color || null;
        renderCat();

        // Tags
        currentTags = (data.tags || []).map(t => ({
            id: parseInt(t.id), name: t.name, color_hex: t.color_hex
        }));
        renderTags();
        addTagBtn.style.display = 'inline-flex';

        // Attachments
        attachments = (data.attachments || []).map(a => ({
            id: parseInt(a.id),
            file_path:     a.file_path,
            file_type:     a.file_type,
            original_name: a.original_name || a.file_path.split('/').pop()
        }));
        renderAttachments();
    }

    init();

    /* ═══════════════════════════════════════════════════════════════════
       CATEGORY
    ═══════════════════════════════════════════════════════════════════ */
    function renderCat() {
        catSlot.innerHTML = '';
        if (currentCatId && currentCatName) {
            const badge = document.createElement('span');
            badge.className = 'category-badge';
            badge.style.backgroundColor = currentCatColor || '#5c6bc0';
            badge.title = 'Kattints a kategória cseréjéhez';
            badge.textContent = '📁 ' + currentCatName;
            badge.addEventListener('click', e => openPicker('cat', e.currentTarget));
            catSlot.appendChild(badge);
        } else {
            const btn = document.createElement('button');
            btn.className = 'add-category-btn';
            btn.textContent = '+ Kategória';
            btn.addEventListener('click', e => openPicker('cat', e.currentTarget));
            catSlot.appendChild(btn);
        }
    }

    /* ═══════════════════════════════════════════════════════════════════
       TAGS
    ═══════════════════════════════════════════════════════════════════ */
    function renderTags() {
        tagsSlot.innerHTML = '';
        currentTags.forEach(tag => {
            const span = document.createElement('span');
            span.className = 'tag-badge';
            span.dataset.id = tag.id;

            const dot = document.createElement('span');
            dot.className = 'tag-dot';
            dot.style.background = tag.color_hex || '#888';

            const label = document.createTextNode(tag.name);

            const removeBtn = document.createElement('button');
            removeBtn.className = 'tag-remove';
            removeBtn.title = 'Tag eltávolítása';
            removeBtn.textContent = '×';
            removeBtn.addEventListener('click', () => removeTag(tag.id));

            span.appendChild(dot);
            span.appendChild(label);
            span.appendChild(removeBtn);
            tagsSlot.appendChild(span);
        });
    }

    async function removeTag(tagId) {
        // Optimistically remove from UI first
        currentTags = currentTags.filter(t => t.id !== tagId);
        renderTags();

        // Then persist to server
        try {
            const res = await fetch('api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'unassign_tag', entry_id: parseInt(entryId), tag_id: tagId })
            }).then(r => r.json());
            if (res.error) {
                alert('Hiba a tag eltávolításakor: ' + res.error);
            }
        } catch (err) {
            console.error('Tag eltávolítási hiba:', err);
        }
    }

    addTagBtn.addEventListener('click', e => openPicker('tag', e.currentTarget));

    /* ═══════════════════════════════════════════════════════════════════
       PICKER POPUP (shared for cat + tag)
    ═══════════════════════════════════════════════════════════════════ */
    const catPicker   = document.getElementById('cat-picker');
    const catSearch   = document.getElementById('cat-search');
    const catList     = document.getElementById('cat-list');
    const catCreateBtn= document.getElementById('cat-create-btn');
    const tagPicker   = document.getElementById('tag-picker');
    const tagSearch   = document.getElementById('tag-search');
    const tagList     = document.getElementById('tag-list');
    const tagCreateBtn= document.getElementById('tag-create-btn');

    let activePicker = null;

    function openPicker(type, anchor) {
        closePickers();
        const picker = type === 'cat' ? catPicker : tagPicker;
        const rect = anchor.getBoundingClientRect();
        picker.style.top  = (rect.bottom + window.scrollY + 6) + 'px';
        picker.style.left = rect.left + 'px';
        picker.classList.add('open');
        activePicker = { el: picker, type };

        if (type === 'cat') {
            catSearch.value = '';
            renderCatList('');
            setTimeout(() => catSearch.focus(), 50);
        } else {
            tagSearch.value = '';
            renderTagList('');
            setTimeout(() => tagSearch.focus(), 50);
        }
    }

    function closePickers() {
        catPicker.classList.remove('open');
        tagPicker.classList.remove('open');
        activePicker = null;
    }

    // Close when clicking outside
    document.addEventListener('click', e => {
        if (!activePicker) return;
        const anchor = e.target.closest('.category-badge, .add-category-btn, .add-tag-btn');
        if (!activePicker.el.contains(e.target) && !anchor) closePickers();
    });

    // ── Category picker ──
    catSearch.addEventListener('input', () => renderCatList(catSearch.value));

    function renderCatList(filter) {
        catList.innerHTML = '';
        const f = filter.toLowerCase();
        const filtered = allCategories.filter(c => c.name.toLowerCase().includes(f));
        if (!filtered.length) {
            catList.innerHTML = '<li class="no-items">Nincs találat</li>'; return;
        }
        filtered.forEach(cat => {
            const li = document.createElement('li');
            li.innerHTML = `<span class="dot" style="background:${cat.color_hex||'#5c6bc0'}"></span>${cat.name}`;
            li.addEventListener('click', () => selectCategory(cat));
            catList.appendChild(li);
        });
    }

    async function selectCategory(cat) {
        closePickers();
        const res = await fetch('api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'assign_category', entry_id: parseInt(entryId), category_id: cat.id })
        }).then(r => r.json());
        if (res.error) { alert('Hiba: ' + res.error); return; }
        currentCatId    = cat.id;
        currentCatName  = cat.name;
        currentCatColor = cat.color_hex;
        renderCat();
    }

    catCreateBtn.addEventListener('click', async () => {
        const name = catSearch.value.trim() || prompt('Új kategória neve:');
        if (!name) return;
        const color = prompt('Szín (HEX, pl. #5c6bc0):', '#5c6bc0') || '#5c6bc0';
        const res = await fetch('api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create_category', name, color_hex: color })
        }).then(r => r.json());
        if (res.error) { alert('Hiba: ' + res.error); return; }
        const newCat = { id: res.id, name, color_hex: color };
        allCategories.push(newCat);
        await selectCategory(newCat);
    });

    // ── Tag picker ──
    tagSearch.addEventListener('input', () => renderTagList(tagSearch.value));

    function renderTagList(filter) {
        tagList.innerHTML = '';
        const f = filter.toLowerCase();
        const assignedIds = new Set(currentTags.map(t => t.id));
        const filtered = allTags.filter(t => !assignedIds.has(t.id) && t.name.toLowerCase().includes(f));
        if (!filtered.length) {
            tagList.innerHTML = '<li class="no-items">Nincs hozzáadható tag</li>'; return;
        }
        filtered.forEach(tag => {
            const li = document.createElement('li');
            li.innerHTML = `<span class="dot" style="background:${tag.color_hex||'#888'}"></span>${tag.name}`;
            li.addEventListener('click', () => selectTag(tag));
            tagList.appendChild(li);
        });
    }

    async function selectTag(tag) {
        closePickers();
        if (currentTags.find(t => t.id === tag.id)) return;
        const res = await fetch('api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'assign_tag', entry_id: parseInt(entryId), tag_id: tag.id })
        }).then(r => r.json());
        if (res.error) { alert('Hiba: ' + res.error); return; }
        currentTags.push({ id: parseInt(tag.id), name: tag.name, color_hex: tag.color_hex });
        renderTags();
    }

    tagCreateBtn.addEventListener('click', async () => {
        const name = tagSearch.value.trim() || prompt('Új tag neve:');
        if (!name) return;
        // Random muted color
        const hue   = Math.floor(Math.random() * 360);
        const color = hslToHex(hue, 45, 50);
        const res = await fetch('api.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'create_tag', name, color_hex: color })
        }).then(r => r.json());
        if (res.error) { alert('Hiba: ' + res.error); return; }
        const newTag = { id: res.id, name, color_hex: color };
        allTags.push(newTag);
        await selectTag(newTag);
    });

    function hslToHex(h, s, l) {
        s /= 100; l /= 100;
        const a = s * Math.min(l, 1-l);
        const f = n => { const k = (n + h/30) % 12; const c = l - a*Math.max(Math.min(k-3, 9-k, 1), -1); return Math.round(255*c).toString(16).padStart(2,'0'); };
        return '#' + f(0) + f(8) + f(4);
    }

    /* ═══════════════════════════════════════════════════════════════════
       ATTACHMENTS
    ═══════════════════════════════════════════════════════════════════ */
    function renderAttachments() {
        attGrid.innerHTML = '';

        if (attachments.length === 0) {
            // Empty state: wide centered button
            const wide = document.createElement('button');
            wide.className = 'att-add-wide';
            wide.innerHTML = '<span style="font-size:1.4rem">+</span><span class="att-add-text">Csatolmány hozzáadása</span>';
            wide.addEventListener('click', () => fileInput.click());
            attGrid.appendChild(wide);
            return;
        }

        attachments.forEach(att => {
            const tile = document.createElement('div');
            tile.className = 'att-thumb';
            const isImage = IMAGE_TYPES.includes(att.file_type);

            if (isImage) {
                const img = document.createElement('img');
                img.src = att.file_path;
                img.alt = att.original_name;
                img.addEventListener('click', () => openLightbox(att.file_path));
                tile.appendChild(img);
            } else {
                tile.addEventListener('click', () => window.open(att.file_path, '_blank'));
                const icon = document.createElement('div');
                icon.className = 'att-icon';
                icon.textContent = FILE_ICON(att.file_type);
                const name = document.createElement('div');
                name.className = 'att-name';
                name.textContent = att.original_name;
                name.title = att.original_name;
                tile.appendChild(icon);
                tile.appendChild(name);
            }

            // Delete button
            const del = document.createElement('button');
            del.className = 'att-del';
            del.title = 'Törlés';
            del.textContent = '×';
            del.addEventListener('click', async e => {
                e.stopPropagation();
                if (!confirm('Biztosan törlöd ezt a csatolmányt?')) return;
                await deleteAttachment(att.id, tile);
            });
            tile.appendChild(del);
            attGrid.appendChild(tile);
        });

        // Small "+" tile at the end
        const addTile = document.createElement('button');
        addTile.className = 'att-add-btn';
        addTile.innerHTML = `+<span>Hozzáad</span>`;
        addTile.title = 'Fájl csatolása';
        addTile.addEventListener('click', () => fileInput.click());
        attGrid.appendChild(addTile);
    }

    async function deleteAttachment(attId, tileEl) {
        tileEl.classList.add('att-uploading');
        const res = await fetch(`api.php?action=delete_attachment&id=${attId}`, {
            method: 'DELETE'
        }).then(r => r.json()).catch(() => ({ error: 'Hálózati hiba' }));

        if (res.error) {
            alert('Törlési hiba: ' + res.error);
            tileEl.classList.remove('att-uploading');
            return;
        }
        attachments = attachments.filter(a => a.id !== attId);
        renderAttachments();
    }

    // File input → upload
    fileInput.addEventListener('change', async () => {
        const files = Array.from(fileInput.files);
        fileInput.value = '';
        for (const file of files) {
            await uploadFile(file);
        }
    });

    async function uploadFile(file) {
        // Show spinner tile
        const spinner = document.createElement('div');
        spinner.className = 'att-thumb att-uploading';
        spinner.innerHTML = '<div class="att-spinner">⏳</div>';
        // Insert before the last "+" tile
        const lastBtn = attGrid.querySelector('.att-add-btn, .att-add-wide');
        attGrid.insertBefore(spinner, lastBtn || null);

        const formData = new FormData();
        formData.append('entry_id', entryId);
        formData.append('file', file);

        let res;
        try {
            res = await fetch('api.php', { method: 'POST', body: formData }).then(r => r.json());
        } catch (err) {
            spinner.remove();
            alert('Feltöltési hiba: ' + err.message);
            return;
        }

        spinner.remove();

        if (res.error) {
            alert('Feltöltési hiba: ' + res.error);
            return;
        }

        attachments.push({
            id: parseInt(res.id),
            file_path:     res.file_path,
            file_type:     res.file_type,
            original_name: res.original_name
        });
        renderAttachments();
    }

    /* ═══════════════════════════════════════════════════════════════════
       LIGHTBOX
    ═══════════════════════════════════════════════════════════════════ */
    function openLightbox(src) { lbImg.src = src; lightbox.classList.add('open'); }
    document.getElementById('lb-close').addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });

    /* ═══════════════════════════════════════════════════════════════════
       WYSIWYG
    ═══════════════════════════════════════════════════════════════════ */
    let fontSize = 3;
    function fmt(cmd) { document.execCommand(cmd, false, null); contentEl.focus(); }
    function fsize(step) { fontSize = Math.max(1, Math.min(7, fontSize + step)); document.execCommand('fontSize', false, fontSize); contentEl.focus(); }
    document.getElementById('font-family').addEventListener('change', function() {
        document.execCommand('fontName', false, this.value); contentEl.focus();
    });

    /* ═══════════════════════════════════════════════════════════════════
       SAVE
    ═══════════════════════════════════════════════════════════════════ */
    saveBtn.addEventListener('click', async () => {
        saveBtn.textContent = 'Mentés...';
        saveBtn.disabled = true;
        const res = await fetch('api.php', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: entryId, title: titleEl.value, content: contentEl.innerHTML })
        }).then(r => r.json()).catch(() => ({ error: 'Hálózati hiba' }));

        if (res.error) { alert('Hiba mentéskor: ' + res.error); }
        else { saveBtn.textContent = '✔ Mentve!'; }
        setTimeout(() => { saveBtn.textContent = 'Mentés'; saveBtn.disabled = false; }, 2000);
    });

    contentEl.addEventListener('focus', function() {
        if (this.innerHTML.trim() === '<br>') this.innerHTML = '';
    });
    </script>
</body>
</html>
