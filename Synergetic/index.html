<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synergetic</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/calendar.css" />
    <link rel="stylesheet" href="./styles/details.css" />
    <link rel="stylesheet" href="./styles/routine.css" />
    <link rel="stylesheet" href="./styles/vue-app.css" />
    <link rel="stylesheet" href="./styles/omnibar.css" />
  </head>

  <body>
    <div id="app">
      <!-- Hamburger: csak graph oldalon -->
      <button v-if="showHamburger" id="hamburger-btn" @click="toggleSidebar">
        ☰
      </button>
      <app-sidebar
        v-if="showSidebar"
        :class="{ closed: !sidebarOpen }"
      ></app-sidebar>
      <main
        id="main-content"
        :class="{ 'sidebar-hidden': !showSidebar || !sidebarOpen }"
      >
        <top-bar v-if="showTopBar"></top-bar>
        <router-view></router-view>
      </main>

      <omni-bar v-if="showOmniBar"></omni-bar>
      <entry-modal></entry-modal>
    </div>

    <!-- ═══ SIDEBAR ═══ -->
    <script type="text/x-template" id="tpl-sidebar">
      <aside id="sidebar">
          <div class="groups-container">
              <div class="groups-header" @click="toggleGroups"><span>Csoportok</span><span>{{ groupsExpanded ? '▼' : '▶' }}</span></div>
              <div class="groups-content" :class="{ open: groupsExpanded }">
                  <input type="text" class="search-box" v-model="groupSearch" placeholder="Keresés csoportra...">
                  <button class="manage-groups-btn" @click="$router.push({ name: 'groups' })">Csoportok kezelése</button>
                  <ul class="group-list">
                      <li v-for="group in filteredGroups" :key="group.id" :data-group="group.id" class="group-item" :class="{ active: group.id == store.currentGroupId }" @click="selectGroup(group)">
                          <div class="group-name">{{ group.name }}</div>
                          <div class="group-stats">{{ group.todo_count||0 }} Feladat | {{ group.event_count||0 }} Esemény | {{ group.note_count||0 }} Jegyzet</div>
                      </li>
                  </ul>
              </div>
          </div>
          <div id="sidebar-entries-container">
              <div v-if="!sortedEntries.length" style="color:var(--text-secondary);text-align:center;font-size:0.85rem;padding:20px;">Ebben a csoportban még nincsenek elemek.</div>
              <div v-for="entry in sortedEntries" :key="entry.id" class="sidebar-entry-item" :class="{ active: entry.id===store.selectedId }" :style="{ '--card-color': entryColor(entry.type) }" @click="selectEntry(entry)" @dblclick="goToDetails(entry)">
                  <div class="sidebar-entry-title" :title="entry.title">{{ entry.title }}</div>
                  <div class="sidebar-entry-type" :style="{ color: entryColor(entry.type), border: '1px solid '+entryColor(entry.type)+'40' }">{{ store.typeNames[entry.type]||entry.type }}</div>
              </div>
          </div>
          <button class="add-new-btn" @click="openModal">+ Új Elem Létrehozása</button>
      </aside>
    </script>

    <!-- ═══ TOPBAR ═══
    <script type="text/x-template" id="tpl-topbar">
        <div class="top-bar">
            <div class="filters">
                <button class="filter-btn" :class="{ active: filters.todo }" @click="toggleFilter('todo')">Tasks</button>
                <button class="filter-btn" :class="{ active: filters.event }" @click="toggleFilter('event')">Events</button>
                <button class="filter-btn" :class="{ active: filters.note }" @click="toggleFilter('note')">Notes</button>
            </div>
            <select class="mode-selector" :value="currentView" @change="changeView">
                <option value="graph">Kapcsolatok (Gráf)</option>
                <option value="calendar">Naptár nézet</option>
                <option value="routine">Rutin tervező</option>
            </select>
        </div>
    </script> -->

    <!-- ═══ OMNIBAR SEARCH ═══ -->
    <script type="text/x-template" id="tpl-omnibar">
              <div>
          <!-- Pull-tab: kis vonal a tetején, középen -->
          <div id="omnibar-pull-tab" @click="toggleVisible" :class="{ active: visible }">
              <div class="pull-tab-line"></div>
          </div>

          <div class="omnibar-wrapper" :class="{ visible: visible }">

              <!-- Glass Container -->
              <div class="omnibar-glass">

                  <!-- Keresőmező -->
                  <div class="omnibar-input-row">
                      <div class="omnibar-search-icon">
                          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                      </div>

                      <div class="omnibar-input-area">
                          <span v-if="searchMode !== 'title' && searchQuery"
                                class="omnibar-inline-token"
                                :class="{ 'mode-tag': searchMode === 'tag', 'mode-content': searchMode === 'content' }"
                                @click="addInlineSearchToken"
                                :title="searchMode === 'tag' ? 'Kattints a tag hozzáadásához' : 'Kattints a tartalom szűrő hozzáadásához'">
                              {{ searchText }}
                          </span>
                          <input ref="searchInput" type="text" v-model="searchText"
                              @focus="openPanel" @keydown.enter="submitSearch"
                              placeholder="Keresés név alapján... (Tipp: #tag, @tartalom)"
                              class="omnibar-input"
                              :class="{ 'text-tag': searchMode === 'tag', 'text-content': searchMode === 'content' }"
                              autocomplete="off">
                      </div>

                      <button v-if="searchText || hasFilters" class="omnibar-clear-btn" @click="clearAll" title="Összes törlése">✕</button>
                  </div>

                  <!-- Elválasztó -->
                  <div v-if="panelOpen" class="omnibar-divider"></div>

                  <!-- Panel -->
                  <div v-if="panelOpen" class="omnibar-panel">

                      <!-- Bal oldali menü -->
                      <div class="omnibar-menu">
                          <div class="omnibar-menu-header">Szűrők</div>
                          <button v-for="item in menuItems" :key="item.id"
                              class="omnibar-menu-item" :class="{ active: activeView === item.id }"
                              @click="switchView(item.id)">
                              <span class="omnibar-menu-icon">{{ item.icon }}</span>
                              {{ item.label }}
                          </button>
                      </div>

                      <!-- Jobb dinamikus tartalom -->
                      <div class="omnibar-dynamic">

                          <!-- DEFAULT -->
                          <div v-if="activeView === 'default'" class="omnibar-default-view">
                              <p>Kezdj el gépelni, vagy válassz egy szűrőt a bal oldalon.</p>
                              <div class="omnibar-hints">
                                  <span><b>#</b> Tag keresés</span>
                                  <span><b>@</b> Tartalom keresés</span>
                              </div>
                          </div>

                          <!-- TAG SUGGESTIONS -->
                          <div v-if="activeView === 'tag-suggestions'">
                              <h4 class="omnibar-view-title">Tag javaslatok</h4>
                              <div v-if="tagSuggestions.length" class="omnibar-tag-list">
                                  <button v-for="tag in tagSuggestions" :key="tag.id" class="omnibar-tag-chip"
                                      :style="{ borderColor: (tag.color_hex||'#818cf8')+'50', color: tag.color_hex||'#818cf8', background: (tag.color_hex||'#818cf8')+'15' }"
                                      @click="addTagFilter(tag)">#{{ tag.name }}</button>
                              </div>
                              <div v-else class="omnibar-empty">Nincs találat a megadott tagre.</div>
                          </div>

                          <!-- CONTENT SUGGESTIONS -->
                          <div v-if="activeView === 'content-suggestions'">
                              <h4 class="omnibar-view-title">Tartalom keresés</h4>
                              <p class="omnibar-hint-text">Nyomj <kbd>Enter</kbd>-t a tartalom szűrő alkalmazásához, vagy kattints a keresőmezőben a kijelölt szövegre.</p>
                          </div>

                          <!-- TITLE SUGGESTIONS -->
                          <div v-if="activeView === 'title-suggestions'">
                              <h4 class="omnibar-view-title">Cím keresés</h4>
                              <p class="omnibar-hint-text">Nyomj <kbd>Enter</kbd>-t a cím szűrő alkalmazásához.</p>
                          </div>

                          <!-- BEJEGYZÉS TÍPUSA -->
                          <div v-if="activeView === 'types'">
                              <h4 class="omnibar-view-title">Bejegyzés típusa</h4>
                              <div class="omnibar-type-toggles">
                                  <button class="omnibar-type-btn" :class="{ active: typeFilters.todo }"
                                      :style="typeFilters.todo ? { borderColor: store.colors.todo, color: store.colors.todo, background: store.colors.todo+'18' } : {}"
                                      @click="toggleType('todo')">
                                      <span class="omnibar-type-dot" :style="{ background: store.colors.todo }"></span> Feladat
                                  </button>
                                  <button class="omnibar-type-btn" :class="{ active: typeFilters.event }"
                                      :style="typeFilters.event ? { borderColor: store.colors.event, color: store.colors.event, background: store.colors.event+'18' } : {}"
                                      @click="toggleType('event')">
                                      <span class="omnibar-type-dot" :style="{ background: store.colors.event }"></span> Esemény
                                  </button>
                                  <button class="omnibar-type-btn" :class="{ active: typeFilters.note }"
                                      :style="typeFilters.note ? { borderColor: store.colors.note, color: store.colors.note, background: store.colors.note+'18' } : {}"
                                      @click="toggleType('note')">
                                      <span class="omnibar-type-dot" :style="{ background: store.colors.note }"></span> Jegyzet
                                  </button>
                              </div>
                              <p class="omnibar-hint-text" style="margin-top:12px;">A kiválasztott típusok alapján frissülnek az elérhető szűrők a bal oldali menüben.</p>
                          </div>

                          <!-- TAGEK -->
                          <div v-if="activeView === 'tags'">
                              <h4 class="omnibar-view-title">Tagek kiválasztása</h4>
                              <input type="text" v-model="tagSearch" placeholder="Tag keresése..." class="omnibar-mini-search">
                              <div class="omnibar-tag-list">
                                  <button v-for="tag in filteredTags" :key="tag.id" class="omnibar-tag-chip"
                                      :style="{ borderColor: (tag.color_hex||'#818cf8')+'50', color: tag.color_hex||'#818cf8', background: (tag.color_hex||'#818cf8')+'15' }"
                                      @click="addTagFilter(tag)">#{{ tag.name }}</button>
                              </div>
                              <div v-if="!filteredTags.length" class="omnibar-empty">Nincs ilyen tag.</div>
                          </div>

                          <!-- KATEGÓRIÁK -->
                          <div v-if="activeView === 'categories'">
                              <h4 class="omnibar-view-title">Kategória kiválasztása</h4>
                              <input type="text" v-model="categorySearch" placeholder="Kategória keresése..." class="omnibar-mini-search">
                              <div class="omnibar-category-list">
                                  <button v-for="cat in filteredCategories" :key="cat.id" class="omnibar-category-chip"
                                      @click="addCategoryFilter(cat)">
                                      <span class="omnibar-cat-dot" :style="{ background: cat.color_hex || '#5c6bc0' }"></span>
                                      {{ cat.name }}
                                  </button>
                              </div>
                              <div v-if="!filteredCategories.length" class="omnibar-empty">Nincs ilyen kategória.</div>
                          </div>

                          <!-- DÁTUMOK -->
                          <div v-if="activeView === 'dates'">
                              <h4 class="omnibar-view-title">Dátum és Időrend</h4>
                              <div class="omnibar-form-group">
                                  <label>Szűrő típus</label>
                                  <select v-model="dateType" class="omnibar-select">
                                      <option value="created_at">Létrehozás dátuma</option>
                                      <option value="updated_at">Utolsó módosítás</option>
                                  </select>
                              </div>
                              <div class="omnibar-btn-row">
                                  <button class="omnibar-action-btn" @click="applyDateOrder('desc')">↓ Újak elöl</button>
                                  <button class="omnibar-action-btn" @click="applyDateOrder('asc')">↑ Régiek elöl</button>
                              </div>
                              <div class="omnibar-form-group" style="margin-top:12px;">
                                  <label class="omnibar-label-between">
                                      <span>Időablak (csúszka)</span>
                                      <span class="omnibar-label-value">{{ dateSliderLabel }}</span>
                                  </label>
                                  <input type="range" min="1" max="365" v-model.number="dateSliderDays" class="omnibar-range">
                                  <button class="omnibar-apply-btn" @click="applyDateWindow">Időablak alkalmazása</button>
                              </div>
                              <div class="omnibar-form-group" style="margin-top:12px;">
                                  <label>Egyedi időablak (Tól - Ig)</label>
                                  <div class="omnibar-date-row">
                                      <input type="date" v-model="dateFrom" class="omnibar-date-input">
                                      <span class="omnibar-date-sep">–</span>
                                      <input type="date" v-model="dateTo" class="omnibar-date-input">
                                  </div>
                                  <button class="omnibar-apply-btn" @click="applyDateRange">Egyedi ablak alkalmazása</button>
                              </div>
                          </div>

                          <!-- HELYSZÍNEK -->
                          <div v-if="activeView === 'locations'">
                              <h4 class="omnibar-view-title">Helyszínek (Több is választható)</h4>
                              <input type="text" v-model="locationSearch" placeholder="Helyszín keresése..." class="omnibar-mini-search">
                              <div class="omnibar-checkbox-list">
                                  <label v-for="loc in filteredLocations" :key="loc.id" class="omnibar-checkbox-item">
                                      <input type="checkbox" :checked="selectedLocationIds.includes(loc.id)" @change="toggleLocation(loc.id)">
                                      <span>{{ loc.name }}</span>
                                  </label>
                              </div>
                              <div v-if="!filteredLocations.length" class="omnibar-empty">Nincs helyszín az adatbázisban.</div>
                              <button v-if="selectedLocationIds.length" class="omnibar-apply-btn" @click="applyLocations">Kiválasztottak hozzáadása ({{ selectedLocationIds.length }})</button>
                          </div>

                          <!-- TODO STÁTUSZ -->
                          <div v-if="activeView === 'todo-status'">
                              <h4 class="omnibar-view-title">Feladatok állapota</h4>
                              <div class="omnibar-status-list">
                                  <button class="omnibar-status-btn status-active" @click="addTodoStatus('active', 'Aktív')"><span class="status-icon">📌</span> Aktív</button>
                                  <button class="omnibar-status-btn status-upcoming" @click="addTodoStatus('upcoming', 'Közelgő (48 óra)')"><span class="status-icon">⏳</span> Közelgő (Következő 48 óra)</button>
                                  <button class="omnibar-status-btn status-completed" @click="addTodoStatus('completed', 'Befejezett')"><span class="status-icon">✅</span> Befejezett</button>
                                  <button class="omnibar-status-btn status-archived" @click="addTodoStatus('archived', 'Archivált')"><span class="status-icon">📦</span> Archivált</button>
                              </div>
                          </div>

                          <!-- CSATOLMÁNYOK -->
                          <div v-if="activeView === 'attachments'">
                              <h4 class="omnibar-view-title">Csatolmány típus szűrő</h4>
                              <div class="omnibar-status-list">
                                  <button class="omnibar-status-btn" @click="addAttachmentType('image', 'Képek')"><span class="status-icon">🖼️</span> Képek (jpg, png, gif, webp, svg)</button>
                                  <button class="omnibar-status-btn" @click="addAttachmentType('video', 'Videók')"><span class="status-icon">🎬</span> Videók (mp4, webm, ogg)</button>
                                  <button class="omnibar-status-btn" @click="addAttachmentType('document', 'Dokumentumok')"><span class="status-icon">📄</span> Dokumentumok (pdf, txt, csv)</button>
                                  <button class="omnibar-status-btn" @click="addAttachmentType('audio', 'Hangfájlok')"><span class="status-icon">🎵</span> Hangfájlok (mp3, ogg, wav)</button>
                              </div>
                          </div>

                          <!-- CSOPORTOK -->
                          <div v-if="activeView === 'groups'">
                              <h4 class="omnibar-view-title">Csoportok (Több is választható)</h4>
                              <input type="text" v-model="groupSearch" placeholder="Csoport keresése..." class="omnibar-mini-search">
                              <div class="omnibar-checkbox-list">
                                  <label v-for="group in filteredGroups" :key="group.id" class="omnibar-checkbox-item">
                                      <input type="checkbox" :checked="selectedGroupIds.includes(group.id)" @change="toggleGroup(group.id)">
                                      <span :style="{ color: group.color_hex || 'var(--text-primary)' }">{{ group.name }}</span>
                                      <span class="omnibar-group-stats">{{ group.todo_count||0 }}F | {{ group.event_count||0 }}E | {{ group.note_count||0 }}J</span>
                                  </label>
                              </div>
                              <button v-if="selectedGroupIds.length" class="omnibar-apply-btn" @click="applyGroups">Kiválasztottak hozzáadása ({{ selectedGroupIds.length }})</button>
                          </div>

                          <!-- ISMÉTLŐDÉS -->
                          <div v-if="activeView === 'recurrence'">
                              <h4 class="omnibar-view-title">Ismétlődés</h4>
                              <div class="omnibar-dev-notice"><span class="dev-icon">🚧</span><span>Ez a funkció fejlesztés alatt áll.</span></div>
                          </div>

                      </div>
                  </div>
              </div>

              <!-- Aktív szűrők polc -->
              <div class="omnibar-shelf" :class="{ active: hasFilters }">
                  <span class="omnibar-shelf-label">Aktív szűrők</span>
                  <div class="omnibar-shelf-tokens">
                      <div v-for="(filter, idx) in activeFilters" :key="idx" class="omnibar-token"
                          :style="{ borderColor: tokenColor(filter.key) + '40' }">
                          <span class="omnibar-token-key" :style="{ color: tokenColor(filter.key) }">{{ filter.key }}:</span>
                          <span class="omnibar-token-value">{{ filter.value }}</span>
                          <button class="omnibar-token-remove" @click="removeToken(idx)">✕</button>
                      </div>
                  </div>
              </div>
          </div>
      </div>
    </script>

    <!-- ═══ TOPBAR (only mode selector) ═══ -->
    <script type="text/x-template" id="tpl-topbar">
      <div class="top-bar">
          <select class="mode-selector" :value="currentView" @change="changeView">
              <option value="graph">Kapcsolatok (Gráf)</option>
              <option value="calendar">Naptár nézet</option>
              <option value="routine">Rutin tervező</option>
          </select>
      </div>
    </script>

    <!-- ═══ GRAPH VIEW ═══ -->
    <script type="text/x-template" id="tpl-graph-view">
      <div class="graph-container" style="width:100%;height:100%;position:relative;">
          <div class="zoom-badge" :class="{ visible: zoomBadgeVisible }">{{ zoomPercent }}</div>
          <canvas ref="canvas" id="graph-canvas" @wheel="onWheel" @mousedown="onMouseDown" @mousemove="onMouseMove" @dblclick="onDblClick" @contextmenu="onRightClick"></canvas>
          <div v-if="showQuickMenu" class="quick-action-popup" :style="{ left:quickMenuPos.x+'px', top:quickMenuPos.y+'px' }">
              <ul class="quick-action-menu" style="display:block">
                  <li @click="quickAction('link')">🔗 Új kapcsolat</li><li @click="quickAction('unlink')">✂️ Kapcsolat bontása</li>
                  <li @click="quickAction('edit')">✏️ Szerkesztés</li><li @click="quickAction('category')">📁 Kategória hozzáadása</li>
                  <li @click="quickAction('tag')">🏷️ Címke (Tag) hozzáadása</li><li class="danger" @click="quickAction('delete')">🗑️ Törlés</li>
              </ul>
              <div v-if="showSubMenu" class="quick-action-menu sub-menu" style="display:block">
                  <div style="padding:10px;border-bottom:1px solid var(--border-color);"><input type="text" class="form-control" v-model="subSearch" placeholder="Keresés...">
                  <button class="btn-primary" style="width:100%;padding:6px;margin-top:8px;font-size:0.85rem" @click="createSubItem">+ Új létrehozása</button></div>
                  <ul style="list-style:none;padding:5px 0;max-height:180px;overflow-y:auto">
                      <li v-for="item in filteredSubItems" :key="item.id" style="padding:6px 12px;cursor:pointer" @click="selectSubItem(item)">
                          <span v-if="item.color_hex" :style="{ backgroundColor:item.color_hex,display:'inline-block',width:'10px',height:'10px',borderRadius:'50%',marginRight:'6px' }"></span>{{ item.name }}
                      </li>
                  </ul>
              </div>
          </div>
          <div v-if="isLinkingMode" class="mode-overlay linking"><span>🔗 Kattints egy másik csomópontra</span><button @click="closeMenus" class="btn-cancel">Mégse</button></div>
          <div v-if="isUnlinkingMode" class="mode-overlay unlinking"><span>✂️ Kattints egy vonalra</span><button @click="closeMenus" class="btn-cancel">Mégse</button></div>
      </div>
    </script>

    <!-- ═══ CALENDAR VIEW ═══ -->
    <script type="text/x-template" id="tpl-calendar-view">
      <div class="cal-full-wrapper">
          <header class="cal-navbar">
              <div class="cal-nav-left">
                  <button class="cal-back-btn" @click="goBack">← Vissza</button>
                  <button class="cal-today-btn" @click="goToday">Ma</button>
              </div>
              <div class="cal-nav-center">
                  <div class="cal-nav-arrows">
                      <button class="cal-arrow" @click="prev">‹</button>
                      <button class="cal-arrow" @click="next">›</button>
                  </div>
                  <span class="cal-title">{{ title }}</span>
              </div>
              <div class="cal-view-tabs">
                  <button class="cal-view-tab" :class="{ active:view==='day' }" @click="setView('day')">Nap</button>
                  <button class="cal-view-tab" :class="{ active:view==='week' }" @click="setView('week')">Hét</button>
                  <button class="cal-view-tab" :class="{ active:view==='month' }" @click="setView('month')">Hónap</button>
              </div>
          </header>
          <div class="cal-main">
              <!-- HAVI -->
              <div v-if="view==='month'" class="mv" ref="mvContainer">
                  <div class="mv-grid-wrap" :style="{ flex:'0 0 '+gridFlex+'%' }">
                      <div class="mv-daynames"><div v-for="d in DAYS_S" :key="d" class="mv-dayname">{{ d }}</div></div>
                      <div class="mv-grid">
                          <div v-for="(cell,idx) in monthCells" :key="idx" class="mv-cell" :class="{ other:cell.isOther,today:cell.isToday,selected:cell.isSelected }" @click="selectCell(cell)">
                              <div class="mv-cell-num">{{ cell.day }}</div>
                              <div v-if="cell.dots.length" class="mv-dots"><div v-for="(color,di) in cell.dots" :key="di" class="mv-dot" :style="{ background:color }"></div></div>
                          </div>
                      </div>
                  </div>
                  <div class="mv-divider" :class="{ dragging:dividerDragging }" @mousedown="startDividerDrag"></div>
                  <div class="mv-agenda">
                      <div class="mv-agenda-header"><div class="mv-agenda-day">{{ selected.getDate() }}</div><div class="mv-agenda-meta">{{ MONTHS[selected.getMonth()] }}, {{ DAYS_F[dayIdx(selected)] }}</div></div>
                      <div v-if="agendaTodos.length===0&&agendaEvents.length===0" class="mv-agenda-empty">Nincs bejegyzés erre a napra</div>

                          <div v-for="entry in agendaTodos" :key="entry.id" class="mv-agenda-item mv-todo-item" :style="{ borderLeftColor:col(entry.type) }" @click="goToEntry(entry)">
                              <div class="mv-agenda-item-body"><div class="mv-agenda-item-title">{{ entry.title }}</div><div class="mv-agenda-item-time mv-todo-meta">{{ todoMeta(entry) }}</div></div>
                              <div v-if="todoRole(entry,selected)==='deadline'||todoRole(entry,selected)==='both'" class="mv-todo-deadline-badge">⏰ Határidő</div>
                              <div v-else-if="todoRole(entry,selected)==='start'" class="mv-todo-start-badge">▶ Kezdés</div>
                          </div>
                      </div></div>
                    </template>
                      <template v-if="agendaEvents.length"><div class="mv-agenda-section"><div v-if="agendaTodos.length" class="mv-agenda-section-label">Események</div><div class="mv-agenda-list">
                          <div v-for="entry in agendaEvents" :key="entry.id" class="mv-agenda-item" :style="{ borderLeftColor:col(entry.type) }" @click="goToEntry(entry)">
                              <div class="mv-agenda-item-body"><div class="mv-agenda-item-title">{{ entry.title }}</div><div class="mv-agenda-item-time">{{ isAllDay(entry)?'Egész nap':fmtTime(entry.start_datetime)+(entry.end_datetime?' – '+fmtTime(entry.end_datetime):'') }}</div></div>
                              <div class="mv-agenda-item-badge" :style="{ background:col(entry.type) }">{{ names[entry.type]||entry.type }}</div>
                          </div>
                      </div></div>
                    </template>
                  </div>
              </div>
              <!-- HETI - + gomb jobb alsó sarok -->
              <div v-if="view==='week'" class="wv">
                  <div class="wv-grid">
                      <div v-for="day in weekDays" :key="day.dayNum" class="wv-day-col" :class="{ today:day.isToday }">
                          <div class="wv-day-header"><span class="wv-day-name">{{ day.dayName }}</span><span class="wv-day-num">{{ day.dayNum }}</span></div>
                          <div class="wv-entries">
                              <div v-for="entry in day.entries" :key="entry.id" class="wv-entry" :style="{ borderLeftColor:col(entry.type) }" @click="goToEntry(entry)">
                                  <span class="wv-entry-title">{{ entry.title }}</span><span class="wv-entry-time">{{ fmtTime(entry.start_datetime) }}</span>
                              </div>
                          </div>
                          <button class="wv-add-btn" @click="addEntryForDate(day.date)" title="Új entry ehhez a naphoz">+</button>
                      </div>
                  </div>
              </div>
              <!-- NAPI -->
              <div v-if="view==='day'" class="dv">
                  <div class="dv-header" :class="{ today:isDayToday }"><div class="dv-header-dayname">{{ DAYS_F[dayIdx(date)] }}</div><div class="dv-header-num">{{ date.getDate() }}</div></div>
                  <div v-if="dayAlldayEntries.length" class="dv-allday-bar"><div v-for="entry in dayAlldayEntries" :key="entry.id" class="dv-allday-chip" :style="{ background:col(entry.type) }" @click="goToEntry(entry)">{{ entry.title }}</div></div>
                  <div v-if="dayTodos.length" class="dv-todo-section"><div class="mv-agenda-section-label">Teendők</div>
                      <div v-for="entry in dayTodos" :key="entry.id" class="dv-entry" :style="{ borderLeftColor:col(entry.type) }" @click="goToEntry(entry)">
                          <div class="dv-entry-body"><div class="dv-entry-title">{{ entry.title }}</div><div class="dv-entry-type">{{ todoMeta(entry) }}</div></div>
                          <div v-if="todoRole(entry,date)==='deadline'||todoRole(entry,date)==='both'" class="mv-todo-deadline-badge">⏰ Határidő</div>
                          <div v-else-if="todoRole(entry,date)==='start'" class="mv-todo-start-badge">▶ Kezdés</div>
                      </div>
                  </div>
                  <div class="dv-body">
                      <div class="dv-gutter" :style="{ height:24*H+'px' }"><div v-for="h in hours24" :key="h" class="dv-hour-label" :style="{ top:h*H+'px' }">{{ String(h).padStart(2,'0') }}:00</div></div>
                      <div class="dv-col" :style="{ height:24*H+'px' }">
                          <div v-for="h in hours24" :key="'l'+h" class="dv-hour-line" :style="{ top:h*H+'px' }"></div>
                          <div v-for="h in hours24" :key="'half'+h" class="dv-half-line" :style="{ top:(h*H+H/2)+'px' }"></div>
                          <div v-if="isDayToday" class="dv-now" :style="{ top:nowLineTop() }"></div>
                          <div v-for="entry in dayTimedEntries" :key="entry.id" class="ev-block" :style="{ top:entryTop(entry),height:entryHeight(entry),background:col(entry.type) }" @click="goToEntry(entry)">
                              <div class="ev-block-title">{{ entry.title }}</div><div class="ev-block-time">{{ fmtTime(entry.start_datetime) }}{{ entry.end_datetime?' – '+fmtTime(entry.end_datetime):'' }}</div>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </div>
    </script>

                      <div v-if="selectedDayItems.length===0" class="routine-day-empty">Nincs rutin elem erre a napra.</div>
                      <div v-for="item in selectedDayItems" :key="item.id" class="routine-day-item" :style="{ borderLeftColor:getItemColor(item) }" @click="openEditModal(item)">

                          <div class="routine-day-item-body"><div class="routine-day-item-title">{{ item.title }}</div><div class="routine-day-item-time">{{ fmtTime(item.start_time) }} – {{ fmtTime(item.end_time) }}</div></div>

                              <div class="routine-item-body"><div class="routine-item-title">{{ item.title }}</div><div class="routine-item-time">{{ fmtTime(item.start_time) }} – {{ fmtTime(item.end_time) }}</div></div>

    <script type="text/x-template" id="tpl-entry-modal">

          <div class="modal-content">
              <div class="modal-header"><h2>Új elem hozzáadása</h2><button class="close-modal-btn" @click="close">&times;</button></div>
              <form @submit.prevent="submit">
                  <div class="form-group" style="padding-bottom:15px;border-bottom:1px solid var(--border-color);">
                      <label style="color:var(--accent-active);font-weight:bold;">Létrehozás típusa</label>
                      <select class="form-control" v-model="creationType"><option value="entry">Új Bejegyzés</option><option value="category">Új Kategória</option><option value="tag">Új Címke (Tag)</option><option value="location">Új Helyszín</option></select>

                  <div v-if="errorMsg" class="form-error">{{ errorMsg }}</div>
                  <!-- ENTRY -->
                  <template v-if="creationType==='entry'">
                      <div class="form-group"><label>Cím</label><input type="text" class="form-control" v-model="entryTitle" placeholder="Ide írd a nevet..."></div>
                      <div class="form-group"><label>Csoport</label><select class="form-control" v-model="entryGroupId"><option v-for="g in groups" :key="g.id" :value="g.id">{{ g.name }}</option></select></div>
                      <div class="form-group"><label>Kategória</label><select class="form-control" v-model="entryCategoryId"><option value="">— Nincs —</option><option v-for="c in categories" :key="c.id" :value="c.id">{{ c.name }}</option></select></div>
                      <div class="form-group"><label>Típus</label><select class="form-control" v-model="entryType"><option value="note">Jegyzet</option><option value="todo">Teendő</option><option value="event">Esemény</option></select></div>
                      <template v-if="entryType==='todo'">
                          <div class="form-group"><label>Tervezett kezdet</label><input type="datetime-local" class="form-control" v-model="todoStart" step="60"></div>
                          <div class="form-group"><label>Határidő</label><input type="datetime-local" class="form-control" v-model="todoDeadline" step="60"></div>
                      </template>
                      <template v-if="entryType==='event'">
                          <div class="form-group"><label><input type="checkbox" v-model="eventAllDay"> Egész napos</label></div>
                          <div class="date-time-row"><div class="form-group"><label>Kezdés *</label><input :type="eventAllDay?'date':'datetime-local'" class="form-control" v-model="eventStart" step="60"></div><div class="form-group"><label>Befejezés</label><input :type="eventAllDay?'date':'datetime-local'" class="form-control" v-model="eventEnd" step="60"></div></div>
                          <div class="form-group"><label>Helyszín</label><select class="form-control" v-model="eventLocationId"><option value="">— Nincs —</option><option v-for="loc in locations" :key="loc.id" :value="loc.id">{{ loc.name }}</option></select></div>
                      </template>
                  </template>
                  <template v-if="creationType==='category'"><div class="form-group"><label>Kategória neve</label><input type="text" class="form-control" v-model="categoryName" placeholder="Pl. Pénzügy..."></div><div class="form-group"><label>Szín</label><input type="color" v-model="categoryColor" class="form-control" style="height:40px;cursor:pointer;"></div></template>
                  <template v-if="creationType==='tag'"><div class="form-group"><label>Címke neve</label><input type="text" class="form-control" v-model="tagName" placeholder="Pl. Sürgős..."></div><div class="form-group"><label>Szín</label><input type="color" v-model="tagColor" class="form-control" style="height:40px;cursor:pointer;"></div></template>
                  <template v-if="creationType==='location'"><div class="form-group"><label>Helyszín neve</label><input type="text" class="form-control" v-model="locationName" placeholder="Pl. Iroda..."></div></template>
                  <button type="submit" class="btn-primary" :disabled="submitting">{{ submitting?'Mentés...':'Létrehozás' }}</button>
              </form>
          </div>
      </div>
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="js/api.js"></script>
    <script src="js/store.js"></script>
    <script src="js/components/AppSidebar.js"></script>
    <script src="js/components/TopBar.js"></script>
    <script src="js/components/OmniBar.js"></script>
    <script src="js/components/GraphView.js"></script>
    <script src="js/components/CalendarView.js"></script>
    <script src="js/components/DetailsView.js"></script>
    <script src="js/components/RoutineView.js"></script>
    <script src="js/components/GroupsView.js"></script>
    <script src="js/components/EntryModal.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
